name: Laravel CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  # Job 1: Test the code
  laravel-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Ensure this matches your server PHP version
      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Generate key
        run: php artisan key:generate
      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache
      - name: Create Database
        run: |
          mkdir -p database
          touch database/database.sqlite
      - name: Execute tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  # Job 2: Deploy to Server
  deploy:
    needs: laravel-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          # Write the secret to the file safely
          echo "$DEPLOY_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Removed ssh-keyscan because StrictHostKeyChecking=no handles it!

      - name: Deploy to aaPanel
        run: |
         ssh -o StrictHostKeyChecking=no -p 2200 -i ~/.ssh/id_rsa root@212.47.68.230 "
          # IMPORTANT: 'set -e' stops the script instantly if a command fails
          set -e 
          
          mkdir -p /www/wwwroot/clovercompany/bhasbni
          cd /www/wwwroot/clovercompany/bhasbni
          
          echo '🔄 Forcing Git to download latest files...'
          git init
          git remote remove origin 2>/dev/null || true
          
          # 🚨 FIX: Using GitHub Token so the server is allowed to read your Private Repo
          git remote add origin https://${{ secrets.GITHUB_TOKEN }}@github.com/MegoABKM/Hasbni_Backend.git
          
          # Download the files
          git fetch origin
          git reset --hard origin/main
          
          echo '📦 Installing Composer...'
          export COMPOSER_ALLOW_SUPERUSER=1
          composer install --no-dev --optimize-autoloader
      
          if [ ! -f .env ]; then
             echo '⚙️ Setting up .env...'
             cp .env.example .env
             php artisan key:generate
          fi

          echo '🗄️ Running Laravel commands...'
          php artisan migrate --force
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear
      
          echo '🔒 Fixing Permissions for aaPanel...'
          chown -R www:www /www/wwwroot/clovercompany/bhasbni
          chmod -R 755 /www/wwwroot/clovercompany/bhasbni
          chmod -R 775 /www/wwwroot/clovercompany/bhasbni/storage
          chmod -R 775 /www/wwwroot/clovercompany/bhasbni/bootstrap/cache
      
          echo '✅ Deployed successfully!'
          "
